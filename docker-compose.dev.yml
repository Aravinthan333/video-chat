networks:
  chat-app-network:
    driver: bridge

volumes:
  redis_data:

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5175:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file:
      - frontend/.env.dev
    networks:
      - chat-app-network
    depends_on:
      - backend

  # psqldb:
  #   image: postgres:16-alpine
  #   container_name: postgres-dev
  #   ports:
  #     - "5433:5432"
  #   environment:
  #     - POSTGRES_USER=postgres
  #     - POSTGRES_PASSWORD=postgres
  #     - POSTGRES_DB=chatapp
  #   volumes:
  #     - chat-app-db-data:/var/lib/postgresql/data
  #   networks:
  #     - chat-app-network

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - chat-app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
      - "5555:5555"
    volumes:
      - ./backend:/app
      - /app/node_modules
    env_file:
      - backend/.env.dev
    networks:
      - chat-app-network
    depends_on:
      - redis

  nginx:
    container_name: nginx-local
    image: nginx:latest
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/nginx.local.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - backend
    networks:
      - chat-app-network
